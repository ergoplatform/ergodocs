theme:
  name: material
  custom_dir: overrides
  #favicon: assets/favicon.png
  palette:
    - scheme: default
      primary: red
      toggle:
        icon: material/toggle-switch-off-outline
        name: Switch to dark mode
    - scheme: slate
      primary: red
      toggle:
        icon: material/toggle-switch
        name: Switch to light mode
  features:
    - content.action.edit
    - content.action.view
    - content.code.copy
    - navigation.tabs
    - navigation.tabs.sticky
    #- navigation.instant
    #- navigation.instant.progress
    - navigation.prune
    - navigation.path
    #- navigation.sections
    #- navigation.tracking
    - navigation.indexes
    - content.tabs.link
    - search.highlight
    - search.suggest
    - search.share
    - header.autohide
    - toc.follow
  logo: assets/logo.png
  font:
    text: Roboto

extra_css:
  - assets/extra.css
  - assets/neoteroi-mkdocs.css
  # - https://unpkg.com/mermaid@8.5.1/dist/mermaid.css

extra_javascript:
  - assets/extra.js
  #- assets/mathjax.js
  #- https://cdnjs.cloudflare.com/ajax/libs/mathjax/2.7.4/MathJax.js?config=TeX-AMS-MML_HTMLorMML
  - https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@8.5.1/dist/mermaid.min.js
  # - https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS_HTML

extra:
  version:
    provider: mike
  analytics:
    provider: google
    property: G-5XM6BXT041
  # generator: false

plugins:
  - search
  #- rss
  #- git-revision-date-localized
  #- glightbox
  - render_swagger:
      allow_arbitrary_locations: true
  - neoteroi.mkdocsoad
  #- mkdocs-jupyter
  #- section-index
  # Removed section-index to avoid nav assertion; Material's navigation.indexes covers the behavior
  #- awesome-pages
  - autolinks
  - tags
  # - bibtex:
  #     bib_file: refs.bib
  #- categories
  #- exclude-search
  #- semiliterate
  #- pagenav-generator
  - mkdocs-simple-hooks:
      hooks:
        on_page_markdown: "tools.hooks:fix_lists"

markdown_extensions:
  - footnotes
  - admonition
  - attr_list
  - codehilite
  - fenced_code
  - mdx_math
  - md_in_html
  - meta
  - tables
  - toc:
      permalink: "#"
      baselevel: 1
      toc_depth: 3
  - extra
  - pymdownx.details
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_div_format
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.blocks.admonition
  - pymdownx.blocks.details
  - pymdownx.betterem
  - pymdownx.tilde
  - pymdownx.highlight
  - pymdownx.snippets
  - pymdownx.emoji
  - pymdownx.magiclink
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.keys
  - pymdownx.saneheaders
  - pymdownx.tasklist:
      custom_checkbox: true
  - mdx_truly_sane_lists
  - neoteroi.cards
  - neoteroi.timeline


