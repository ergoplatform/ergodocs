name: Source Watch

on:
  schedule:
    - cron: "17 8 * * 1"
  workflow_dispatch:

jobs:
  scan:
    name: Scan watched source repos
    runs-on: ubuntu-latest

    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run source watch
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python tools/source_watch.py scan \
            --github \
            --new-only \
            --update-baseline \
            --format json \
            --output source-watch.json \
            --pr-comment-file source-watch.md \
            --create-issues \
            --no-fail-on-changes

      - name: Upload report
        uses: actions/upload-artifact@v4
        with:
          name: source-watch-report
          path: |
            source-watch.json
            source-watch.md
