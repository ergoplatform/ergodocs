name: Docs quality

on:
  pull_request:
    paths:
      - "docs/**"
      - "mkdocs.yml"
      - "overrides/**"
      - "hooks.py"
      - "tools/**"
      - "tests/**"
      - "requirements.txt"
      - ".github/workflows/docs-quality.yml"
  workflow_dispatch:

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  build:
    name: Build and audit docs
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run tooling tests
        run: python -m unittest discover -s tests

      - name: Build site
        run: mkdocs build --site-dir site_ci

      - name: Audit navigation
        run: python tools/nav_audit.py

      - name: Validate source watch metadata
        run: python tools/source_watch.py --strict

      - name: Check source watch inventory
        run: python tools/source_watch_inventory.py --check
