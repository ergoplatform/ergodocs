name: Weekly Docs Review

on:
  schedule:
    - cron: "0 9 * * 5"
  workflow_dispatch:
    inputs:
      days:
        description: "Days back to scan"
        required: false
        default: "7"
      after:
        description: "Override start date, YYYY-MM-DD"
        required: false
      mode:
        description: "Review mode: full, discord-only, or source-only"
        required: false
        default: "full"

concurrency:
  group: docs-source-watch
  cancel-in-progress: false

jobs:
  scan:
    name: Build weekly docs review package
    runs-on: ubuntu-latest
    timeout-minutes: 20

    permissions:
      contents: read
      issues: write

    env:
      DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
      GITHUB_TOKEN: ${{ github.token }}
      GH_TOKEN: ${{ github.token }}
      GENERAL_CHANNEL: "668903786902847502"
      DEVELOPMENT_CHANNEL: "669989266478202917"
      REPORT_DIR: "weekly-discord-docs"
      SCAN_DAYS: ${{ github.event.inputs.days || '7' }}
      SCAN_AFTER: ${{ github.event.inputs.after || '' }}
      REVIEW_MODE: ${{ github.event.inputs.mode || 'full' }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install Python dependencies
        run: python -m pip install -r requirements.txt

      - name: Validate mode and window
        id: window
        run: |
          case "$REVIEW_MODE" in
            full|discord-only|source-only) ;;
            *)
              echo "Invalid mode: $REVIEW_MODE. Use full, discord-only, or source-only." >&2
              exit 1
              ;;
          esac

          if [ -n "$SCAN_AFTER" ]; then
            AFTER="$SCAN_AFTER"
          else
            AFTER="$(date -u -d "$SCAN_DAYS days ago" +%F)"
          fi

          BEFORE="$(date -u +%F)"
          mkdir -p "$REPORT_DIR"

          {
            echo "after=$AFTER"
            echo "before=$BEFORE"
            echo "issue_date=$BEFORE"
          } >> "$GITHUB_OUTPUT"

      - name: Ensure issue labels
        run: |
          gh label create docs --color 0e8a16 --description "Documentation work" || true
          gh label create source-watch --color 1d76db --description "Source Watch review lead" || true
          gh label create automated --color bfdadc --description "Created or updated by automation" || true
          gh label create weekly-review --color c5def5 --description "Weekly documentation review" || true

      - name: Install DiscordChatExporter
        if: env.REVIEW_MODE != 'source-only'
        run: |
          mkdir -p /tmp/discordchatexporter
          gh release download \
            --repo Tyrrrz/DiscordChatExporter \
            --pattern "DiscordChatExporter.Cli.*linux-x64*.zip" \
            --dir /tmp/discordchatexporter
          unzip /tmp/discordchatexporter/DiscordChatExporter.Cli.*linux-x64*.zip -d /tmp/discordchatexporter
          chmod +x /tmp/discordchatexporter/DiscordChatExporter.Cli

      - name: Export Discord discussion leads
        if: env.REVIEW_MODE != 'source-only'
        run: |
          if [ -z "$DISCORD_TOKEN" ]; then
            echo "DISCORD_TOKEN repository secret is required for mode '$REVIEW_MODE'." >&2
            exit 1
          fi

          for CHANNEL in "general:$GENERAL_CHANNEL" "development:$DEVELOPMENT_CHANNEL"; do
            NAME="${CHANNEL%%:*}"
            ID="${CHANNEL##*:}"
            EXPORT_PATH="$(python tools/discord_dev_digest/discord_dev_digest.py export \
              --channel "$ID" \
              --after "${{ steps.window.outputs.after }}" \
              --before "${{ steps.window.outputs.before }}" \
              --exporter /tmp/discordchatexporter/DiscordChatExporter.Cli \
              --output-dir "$REPORT_DIR")"
            for PROFILE in docs ecosystem github-links; do
              python tools/discord_dev_digest/discord_dev_digest.py analyze \
                --channel "$ID" \
                --after "${{ steps.window.outputs.after }}" \
                --before "${{ steps.window.outputs.before }}" \
                --profile "$PROFILE" \
                --input "$EXPORT_PATH" \
                --output-dir "$REPORT_DIR"
            done
            printf "%s %s\n" "$NAME" "$ID" >> "$REPORT_DIR/channels.txt"
          done

      - name: Open or update tracking issue
        id: tracking_issue
        run: |
          TITLE="Weekly Docs Review: ${{ steps.window.outputs.issue_date }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          {
            echo "Weekly documentation review package."
            echo
            echo "Window: ${{ steps.window.outputs.after }} to ${{ steps.window.outputs.before }} UTC"
            echo "Mode: \`$REVIEW_MODE\`"
            echo
            echo "This workflow has two independent inputs:"
            echo "- Discord discussion leads: exported from general and development channels when mode is \`full\` or \`discord-only\`."
            echo "- Full watched-source scan: every docs page with \`source_repos\` metadata is scanned when mode is \`full\` or \`source-only\`. This is not limited to repositories mentioned on Discord."
            echo
            echo "Reports are attached to the workflow artifact:"
            echo "$RUN_URL"
            echo
            echo "Maintainer workflow:"
            echo "1. Read the docs, ecosystem, GitHub-links, and Source Watch reports that exist for this mode."
            echo "2. Treat Discord as leads only."
            echo "3. Verify claims against repositories, releases, issues, EIPs, or maintainer sources."
            echo "4. Update docs naturally. Do not mention the scan or chat export in public docs."
            echo "5. Run source_watch, nav_audit, structure_audit, git diff --check, and mkdocs build."
            echo "6. Open a PR with source links and verification notes."
          } > "$REPORT_DIR/issue-body.md"

          gh issue list --state open --limit 100 --json number,title \
            --jq ".[] | select((.title | startswith(\"Weekly Docs Review:\") or startswith(\"Weekly Discord docs leads:\")) and .title != \"$TITLE\") | .number" \
            | while read -r OLD_ISSUE; do
                [ -n "$OLD_ISSUE" ] || continue
                gh issue close "$OLD_ISSUE" --comment "Closing because a newer weekly docs review run superseded this tracking issue: $RUN_URL"
              done

          ISSUE_NUMBER="$(gh issue list --state open --search "$TITLE in:title" --json number,title --jq ".[] | select(.title == \"$TITLE\") | .number" | head -n 1)"

          if [ -n "$ISSUE_NUMBER" ]; then
            gh issue edit "$ISSUE_NUMBER" --body-file "$REPORT_DIR/issue-body.md" --add-label docs --add-label automated --add-label weekly-review
          else
            ISSUE_URL="$(gh issue create --title "$TITLE" --body-file "$REPORT_DIR/issue-body.md" --label docs --label automated --label weekly-review)"
            ISSUE_NUMBER="${ISSUE_URL##*/}"
          fi

          echo "issue_number=$ISSUE_NUMBER" >> "$GITHUB_OUTPUT"

      - name: Scan all watched source repos
        if: env.REVIEW_MODE != 'discord-only'
        run: |
          python tools/source_watch.py scan \
            --github \
            --since "${{ steps.window.outputs.after }}" \
            --watch-mode narrow \
            --release-owner ergoplatform \
            --release-owner ScorexFoundation \
            --no-open-prs \
            --format json \
            --output "$REPORT_DIR/source-watch.json" \
            --no-fail-on-changes

      - name: Prepare empty source summary
        if: env.REVIEW_MODE == 'discord-only'
        run: |
          echo '{"issues":[]}' > "$REPORT_DIR/per-page-issues.json"

      - name: Open per-page source review issues
        if: env.REVIEW_MODE != 'discord-only'
        run: |
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          python tools/weekly_docs_prs.py \
            --report "$REPORT_DIR/source-watch.json" \
            --repo "${{ github.repository }}" \
            --artifact-url "$RUN_URL" \
            --window "${{ steps.window.outputs.after }} to ${{ steps.window.outputs.before }}" \
            --label docs \
            --label source-watch \
            --label automated \
            --close-stale \
            --output "$REPORT_DIR/per-page-issues.json"
          cat "$REPORT_DIR/per-page-issues.json"

      - name: Summarize issue actions
        id: issue_summary
        run: |
          python - <<'PY' > "$REPORT_DIR/issue-summary.env"
          import json
          from pathlib import Path

          path = Path("weekly-discord-docs/per-page-issues.json")
          data = json.loads(path.read_text(encoding="utf-8")) if path.exists() else {"issues": []}
          issues = data.get("issues", [])
          counts = {
              "created": 0,
              "updated": 0,
              "error": 0,
              "skipped_reviewed": 0,
              "skipped_low_only": 0,
              "skipped_not_actionable": 0,
              "skipped_covered": 0,
              "skipped_open_pr_only": 0,
              "closed_stale": 0,
              "dry_run": 0,
          }
          for item in issues:
              action = item.get("action", "")
              if action == "created":
                  counts["created"] += 1
              elif action == "updated":
                  counts["updated"] += 1
              elif action == "error":
                  counts["error"] += 1
              elif action == "skipped-reviewed":
                  counts["skipped_reviewed"] += 1
              elif action == "skipped-low-only":
                  counts["skipped_low_only"] += 1
              elif action == "skipped-not-actionable":
                  counts["skipped_not_actionable"] += 1
              elif action == "skipped-covered":
                  counts["skipped_covered"] += 1
              elif action == "skipped-open-pr-only":
                  counts["skipped_open_pr_only"] += 1
              elif action == "closed-stale":
                  counts["closed_stale"] += 1
              elif action == "dry-run":
                  counts["dry_run"] += 1
          counts["total"] = len(issues)
          counts["actionable"] = counts["created"] + counts["updated"] + counts["error"]
          for key, value in counts.items():
              print(f"{key}={value}")
          PY

          cat "$REPORT_DIR/issue-summary.env" >> "$GITHUB_OUTPUT"

      - name: Close tracking issue when no page review is needed
        if: env.REVIEW_MODE != 'discord-only'
        run: |
          ISSUE_NUMBER="${{ steps.tracking_issue.outputs.issue_number }}"
          RUN_URL="https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ steps.issue_summary.outputs.actionable }}" = "0" ]; then
            {
              echo "Automated review completed."
              echo
              echo "No per-page documentation review issues were needed."
              echo
              echo "Summary:"
              echo "- Candidates checked: ${{ steps.issue_summary.outputs.total }}"
              echo "- Skipped as already reviewed: ${{ steps.issue_summary.outputs.skipped_reviewed }}"
              echo "- Skipped as low-signal: ${{ steps.issue_summary.outputs.skipped_low_only }}"
              echo "- Skipped as not documentation-relevant: ${{ steps.issue_summary.outputs.skipped_not_actionable }}"
              echo "- Skipped as already covered in page text: ${{ steps.issue_summary.outputs.skipped_covered }}"
              echo "- Skipped as open-PR-only: ${{ steps.issue_summary.outputs.skipped_open_pr_only }}"
              echo "- Closed stale page issues: ${{ steps.issue_summary.outputs.closed_stale }}"
              echo "- Actionable page issues: ${{ steps.issue_summary.outputs.actionable }}"
              echo
              echo "Workflow run: $RUN_URL"
            } > "$REPORT_DIR/no-action-comment.md"
            gh issue comment "$ISSUE_NUMBER" --body-file "$REPORT_DIR/no-action-comment.md"
            gh issue close "$ISSUE_NUMBER"
          else
            echo "Keeping tracking issue #$ISSUE_NUMBER open because ${{ steps.issue_summary.outputs.actionable }} actionable page issue(s) were created, updated, or errored."
          fi

      - name: Write GitHub Actions summary
        if: always()
        run: |
          {
            echo "## Weekly Docs Review"
            echo
            echo "- Mode: \`$REVIEW_MODE\`"
            echo "- Window: \`${{ steps.window.outputs.after }}\` to \`${{ steps.window.outputs.before }}\` UTC"
            echo "- Discord leads: $([ "$REVIEW_MODE" = "source-only" ] && echo "skipped" || echo "generated")"
            echo "- Full watched-source scan: $([ "$REVIEW_MODE" = "discord-only" ] && echo "skipped" || echo "completed")"
            echo "- Candidate page results: \`${{ steps.issue_summary.outputs.total || '0' }}\`"
            echo "- Skipped already reviewed: \`${{ steps.issue_summary.outputs.skipped_reviewed || '0' }}\`"
            echo "- Skipped low-signal: \`${{ steps.issue_summary.outputs.skipped_low_only || '0' }}\`"
            echo "- Skipped not documentation-relevant: \`${{ steps.issue_summary.outputs.skipped_not_actionable || '0' }}\`"
            echo "- Skipped already covered: \`${{ steps.issue_summary.outputs.skipped_covered || '0' }}\`"
            echo "- Skipped open-PR-only: \`${{ steps.issue_summary.outputs.skipped_open_pr_only || '0' }}\`"
            echo "- Closed stale page issues: \`${{ steps.issue_summary.outputs.closed_stale || '0' }}\`"
            echo "- Issues created: \`${{ steps.issue_summary.outputs.created || '0' }}\`"
            echo "- Issues updated: \`${{ steps.issue_summary.outputs.updated || '0' }}\`"
            echo "- Errors: \`${{ steps.issue_summary.outputs.error || '0' }}\`"
            echo "- Tracking issue: #${{ steps.tracking_issue.outputs.issue_number || 'not-created' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload reports
        uses: actions/upload-artifact@v4
        with:
          name: weekly-docs-review-${{ steps.window.outputs.issue_date }}
          path: weekly-discord-docs/
